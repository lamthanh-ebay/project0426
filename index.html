<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="./assets/favicon/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
        <link rel="shortcut icon" href="./assets/favicon/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-title" content="Lucy Pet" />
        <link rel="manifest" href="./assets/favicon/site.webmanifest" />

        <!-- Reset CSS -->
        <link rel="stylesheet" href="./assets/css/reset.css" />

        <!-- Embed Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Sora:wght@100..800&display=swap"
            rel="stylesheet"
        />

        <!-- Style CSS -->
        <link rel="stylesheet" href="./assets/css/styles.css" />
    </head>
    <body style="height: 10000px">
        <!-- HEADER -->
        <header class="header">
            <div class="container">
                <div class="header__wrap">
                    <!-- Logo -->
                    <a href="/" class="logo">
                        <img src="./assets/img/Lucy-pet-logo.svg" alt="Lucy Pet" class="logo__image" />
                    </a>

                    <!-- Navbar -->
                    <nav class="navbar">
                        <ul class="navbar__list">
                            <li class="navbar__item">
                                <a href="#!" class="navbar__link" data-text="Home">Home</a>
                            </li>
                            <li class="navbar__item">
                                <a href="#!" class="navbar__link" data-text="About">About</a>
                            </li>
                            <li class="navbar__item">
                                <a href="#!" class="navbar__link" data-text="Services & Rates">Services & Rates</a>
                            </li>
                            <li class="navbar__item">
                                <a href="#!" class="navbar__link" data-text="Reviews">Reviews</a>
                            </li>
                            <li class="navbar__item">
                                <a href="#!" class="navbar__link" data-text="Contacts us">Contacts us</a>
                            </li>
                        </ul>
                    </nav>

                    <!-- Header action -->
                    <div class="header-action">
                        <a href="#!" class="header-action__link">Sign in</a>
                        <a href="#!" class="btn header-action__btn">Sign up</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- HERO -->
        <section class="section hero">
            <div class="container">
                <div class="section__wrap hero__wrap">
                    <!-- Hero media -->
                    <div class="hero-media">
                        <!-- Hero media image 1 -->
                        <div class="hero-media-image__wrap">
                            <img src="./assets/img/hero-pet-01.png" alt="Established & Trusted Pet Care Service" class="hero-media-image__img" />
                            <img src="./assets/img/hero-decor-01.svg" alt="hero image decor" class="hero-media-image__decor hero-media-image__decor--left" />
                            <img src="./assets/img/hero-decor-02.svg" alt="hero image decor" class="hero-media-image__decor hero-media-image__decor--right" />
                        </div>

                        <!-- Hero media image 2 -->
                        <div class="hero-media-image__wrap hero-media-image__wrap--small">
                            <img src="./assets/img/hero-pet-02.png" alt="" class="hero-media-image__img" />
                        </div>

                        <!-- Hero media box content -->
                        <div class="hero-media-box-content">
                            <div class="media-box-content-item">
                                <img src="./assets/img/hero-pet-03.png" alt="Pet Health" class="media-box-content-item__thumb" />
                                <div class="media-box-content-item__info">
                                    <p class="media-box-content-item__title">Pet Health</p>
                                    <span class="media-box-content-item__skeleton-screen"></span>
                                    <span class="media-box-content-item__skeleton-screen"></span>
                                </div>
                            </div>

                            <div class="hero-media-separate"></div>

                            <div class="media-box-content-item">
                                <img src="./assets/img/hero-pet-04.png" alt="Pet care" class="media-box-content-item__thumb" />
                                <div class="media-box-content-item__info">
                                    <p class="media-box-content-item__title">Pet care</p>
                                    <span class="media-box-content-item__skeleton-screen"></span>
                                    <span class="media-box-content-item__skeleton-screen"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Hero content -->
                    <div class="hero-content">
                        <h1 class="hero-content__heading">Established & Trusted Pet Care Service</h1>
                        <p class="hero-content__desc">Discover a wide variety of Pawsitive services to choose from, including daycare, private walks, office duty and spa.</p>

                        <!-- Hero CTA -->
                        <div class="hero-cta">
                            <a href="#!" class="btn btn--primary hero-cta__btn">
                                Book a Meet
                                <span class="hero-cta__icon-wrap">
                                    <svg width="4" height="6" viewBox="0 0 4 6" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M0.5 0.5L3 3L0.5 5.5" stroke="#FD5056" stroke-linecap="round" stroke-linejoin="round" />
                                    </svg>
                                </span>
                            </a>
                            <a href="#!" class="hero-cta__link">Schedule a Call</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </body>
</html>
